spring:
  application:
    name: base-auth
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: auth
    password: auth
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    generate-ddl: true
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user

jwt:
  secret: z8vB7yK2pL5mN9qR3wX0sT6vF1gH4jK8lO2pM5nQ9rS3uW6xY0zB2cE5fH8kK1mN
  access-expiration: 900000 # 15 min (15 * 60 * 1000)
  refresh-expiration: 604800000 # 7 days (7 * 24 * 60 * 60 * 1000)
