spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy-id
            client-secret: dummy-secret
          github:
            client-id: dummy-id
            client-secret: dummy-secret

jwt:
  secret: test_secret_key_for_testing_purposes_only_1234567890
  access-expiration: 3600000
  refresh-expiration: 86400000
