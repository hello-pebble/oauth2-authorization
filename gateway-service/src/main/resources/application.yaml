server:
  port: 8000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: http://localhost:8080
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}
        - id: matching-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/matching/**
        - id: task-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/tasks/**, /api/dates/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
