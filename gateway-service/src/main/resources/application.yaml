server:
  port: ${PORT:8000}      # Render가 부여하는 동적 포트 수용 (기본 8000)
  address: 0.0.0.0        # 모든 네트워크 인터페이스에서 외부 요청 수신 허용

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      # [CORS 설정] 브라우저에서 Gateway를 통해 다른 도메인으로 요청 시 발생하는 보안 이슈 해결
      globalcors:
        add-to-chain: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"   # 모든 오리진 허용 (배포 후 실제 도메인으로 제한 권장)
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "Authorization" # 클라이언트가 JWT 토큰을 읽을 수 있도록 허용

      routes:
        # [PUBLIC] 인증 없이 누구나 접근 가능한 경로 (메인 페이지, 정적 리소스, 로그인/회원가입)
        - id: public-access-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/, /index.html, /static/**, /css/**, /js/**, /favicon.ico, /api/v1/login, /api/v1/users/signup, /api/v1/refresh, /api/v1/waiting-room/**

        # [PRIVATE] 인증이 반드시 필요한 비즈니스 서비스 경로 (매칭 서비스)
        - id: private-matching-route
          uri: ${MATCHING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/matching/**

        # [PRIVATE] 인증이 반드시 필요한 비즈니스 서비스 경로 (업무 관리 서비스)
        - id: private-task-route
          uri: ${TASK_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/tasks/**, /api/v1/dates/**
