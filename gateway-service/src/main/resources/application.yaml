server:
  port: ${PORT}
  address: 0.0.0.0

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-chain: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders: "Authorization"

      routes:
        # 1. PUBLIC: Auth Service (Login, Signup, Landing Page)
        - id: public-access-route
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/, /index.html, /static/**, /css/**, /js/**, /favicon.ico, /api/v1/login, /api/v1/users/signup, /api/v1/refresh, /api/v1/waiting-room/**

        # 2. PRIVATE: Matching Service
        - id: private-matching-route
          uri: ${MATCHING_SERVICE_URL}
          predicates:
            - Path=/api/v1/matching/**

        # 3. PRIVATE: Task Service
        - id: private-task-route
          uri: ${TASK_SERVICE_URL}
          predicates:
            - Path=/api/v1/tasks/**, /api/v1/dates/**
