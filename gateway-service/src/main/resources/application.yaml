server:
  port: ${PORT:8000}
  address: 0.0.0.0

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - RewriteLocationResponseHeader=AS_IN_REQUEST, Location, .*
      routes:
        # 1. PUBLIC: Auth Service
        - id: public-access-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8080}
          order: -1
          predicates:
            - Path=/, /index.html, /login.html, /signup.html, /login, /signup, /favicon.ico, /api/v1/login, /api/v1/users/signup, /api/v1/users/me, /api/v1/logout, /api/v1/refresh, /api/tasks/access-info

        # Auth: /me 페이지 → auth 모듈 index.html
        - id: me-page
          uri: ${AUTH_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/me, /me/
          filters:
            - RewritePath=/me/?, /index.html


        # 2. PRIVATE: Task Service
        - id: private-task-route
          uri: ${TASK_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/tasks/**, /api/v1/dates/**, /tasks/**

        # 3. PUBLIC: Preview Service
        - id: public-preview-route
          uri: ${PREVIEW_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/preview/**, /preview/**

        # 4. PRIVATE: Matching Service
        - id: private-matching-route
          uri: ${MATCHING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/matching/**, /matching/**

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
