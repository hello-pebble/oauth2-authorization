server:
  port: ${PORT:8000}
  address: 0.0.0.0

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # 1. PUBLIC: Auth Service
        - id: public-access-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/static/**, /css/**, /js/**, /favicon.ico, /api/v1/login, /api/v1/users/signup, /api/v1/refresh, /api/v1/waiting-room/**

        # 2. PUBLIC: Preview Service
        - id: public-preview-route
          uri: ${PREVIEW_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/preview/**, /preview/**

        # 3. PRIVATE: Matching Service
        - id: private-matching-route
          uri: ${MATCHING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/matching/**, /matching/**

        # 4. PRIVATE: Task Service
        - id: private-task-route
          uri: ${TASK_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/tasks/**, /api/v1/dates/**, /tasks/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
