server:
  port: 8000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # 1. Auth Service (인증 관련 엔드포인트)
        - id: auth-module
          uri: http://localhost:8080
          predicates:
            - Path=/login, /logout, /oauth2/**, /api/v1/login, /api/v1/users/signup, /api/v1/refresh, /api/v1/waiting-room/**, /.well-known/**, /favicon.ico

        # 2. Preview Service (Public)
        - id: preview-module
          uri: http://localhost:8084
          predicates:
            - Path=/preview/**, /api/v1/preview/**
          filters:
            - RewritePath=/preview/?(?<segment>.*), /$\{segment}

        # 3. Matching Service (Private)
        - id: matching-module
          uri: http://localhost:8081
          predicates:
            - Path=/matching/**, /api/v1/matching/**
          filters:
            - RewritePath=/matching/?(?<segment>.*), /$\{segment}

        # 4. Task Service (Private)
        - id: task-module
          uri: http://localhost:8083
          predicates:
            - Path=/tasks/**, /api/v1/tasks/**, /api/v1/dates/**
          filters:
            - RewritePath=/tasks/?(?<segment>.*), /$\{segment}

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG
