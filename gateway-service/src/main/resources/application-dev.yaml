server:
  port: 8000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # 1. Auth Service (Public: Login, Signup, Refresh)
        - id: auth-module
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/auth/**, /api/v1/login, /api/v1/users/signup, /api/v1/refresh

        # 2. Matching Service (Private: Matching functions)
        - id: matching-module
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/matching/**

        # 3. Task Service (Private: Task/Schedule functions)
        - id: task-module
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/tasks/**, /api/v1/dates/**

        # 4. Static Content / Landing Page
        - id: landing-page
          uri: http://localhost:8080
          predicates:
            - Path=/, /index.html, /static/**, /css/**, /js/**, /favicon.ico
