<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Base Auth Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8f9fa; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 420px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 0.5rem; font-weight: 800; }
        p { color: #5f6368; margin-bottom: 2rem; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; margin: 12px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.2s; text-decoration: none; box-sizing: border-box; }
        .btn-google { background: #ffffff; color: #3c4043; border: 1px solid #dadce0; }
        .btn-google:hover { background: #f1f3f4; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1765cf; }
        .input-group { text-align: left; margin-bottom: 1rem; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #3c4043; }
        input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .status-box { margin-top: 20px; padding: 20px; background: #e8f0fe; border-radius: 12px; display: none; border: 1px solid #d2e3fc; }
        #user-info { display: none; text-align: left; }
        pre { background: #f1f3f4; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem; }
        .divider { margin: 24px 0; border-top: 1px solid #dadce0; position: relative; }
        .divider::after { content: "OR"; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 10px; color: #70757a; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Auth Demo</h1>
        <p>Kotlin + Spring Security + JWT + Redis</p>
        
        <!-- 로그인 전 -->
        <div id="login-section">
            <a href="/oauth2/authorization/google" class="btn btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" height="18" style="margin-right: 10px;">
                Google로 로그인
            </a>
            
            <div class="divider"></div>

            <div class="input-group">
                <label for="username">사용자명</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="password">
            </div>
            <button onclick="handleLogin()" class="btn btn-primary">로그인</button>
        </div>

        <!-- 대기열 안내 -->
        <div id="waiting-section" class="status-box">
            <h3 style="margin-top:0; color: #1967d2;">접속 대기 중</h3>
            <p style="margin-bottom: 10px;">현재 대기 순번: <strong id="wait-rank" style="font-size: 1.5rem; color: #1a73e8;">-</strong>번</p>
            <progress id="wait-progress" value="0" max="100" style="width: 100%;"></progress>
            <p style="font-size: 0.85rem; margin-top: 10px; margin-bottom: 0;">순서가 되면 자동으로 로그인이 재시도됩니다.</p>
        </div>

        <!-- 로그인 후 -->
        <div id="user-info">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin: 0;">프로필 정보</h3>
                <span id="auth-method" style="font-size: 0.75rem; background: #e6f4ea; color: #137333; padding: 2px 8px; border-radius: 12px;">JWT Authenticated</span>
            </div>
            <pre id="profile-data"></pre>
            <button onclick="logout()" class="btn" style="background: #f1f3f4; color: #3c4043; margin-top: 20px;">로그아웃</button>
        </div>
    </div>

    <script>
        let accessToken = "";

        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if(!username || !password) { alert('입력 정보를 확인해주세요.'); return; }

            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const res = await fetch('/api/v1/login', { method: 'POST', body: formData });
                
                if (res.status === 403) { // 대기열 발생
                    const data = await res.json();
                    if(data.status === "WAITING") {
                        startWaiting(username, data.rank);
                    }
                } else if (res.ok) {
                    accessToken = res.headers.get('Authorization').split(' ')[1];
                    showProfile();
                } else {
                    alert('로그인 실패: 사용자 정보를 확인하세요.');
                }
            } catch (e) {
                alert('서버 연결 오류');
            }
        }

        function startWaiting(username, initialRank) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('waiting-section').style.display = 'block';
            document.getElementById('wait-rank').innerText = initialRank;

            const poll = setInterval(async () => {
                try {
                    const res = await fetch(`/api/v1/waiting-room/status?userId=${username}`);
                    const data = await res.json();
                    document.getElementById('wait-rank').innerText = data.rank;

                    if (data.status === 'ALLOWED') {
                        clearInterval(poll);
                        document.getElementById('waiting-section').innerHTML = "<h3>진입 허용됨!</h3><p>로그인을 다시 시도합니다...</p>";
                        setTimeout(() => {
                            document.getElementById('waiting-section').style.display = 'none';
                            document.getElementById('login-section').style.display = 'block';
                            handleLogin(); // 자동 재시도
                        }, 1500);
                    }
                } catch (e) {
                    console.error("Polling error", e);
                }
            }, 2000);
        }

        async function showProfile() {
            try {
                const res = await fetch('/api/v1/users/me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await res.json();
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('waiting-section').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('profile-data').innerText = JSON.stringify(data, null, 2);
            } catch (e) {
                alert('정보를 불러오지 못했습니다.');
            }
        }

        function logout() {
            accessToken = "";
            location.reload();
        }

        // OAuth2 로그인 후 리다이렉트 처리 (URL에 토큰이 있는 경우 등 대비)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('token')) {
                accessToken = urlParams.get('token');
                showProfile();
            }
        };
    </script>
</body>
</html>
