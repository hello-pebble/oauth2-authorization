<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Auth Success - Token Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f8fafc; color: #1e293b; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #2563eb; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .token-card { background: #1e293b; color: #f8fafc; padding: 20px; border-radius: 8px; margin: 20px 0; font-family: 'Fira Code', monospace; font-size: 0.9em; word-break: break-all; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-outline { border: 1px solid #cbd5e1; color: #64748b; }
        .btn-outline:hover { background: #f1f5f9; }
        .status-badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 9999px; font-size: 0.8em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Authentication Successful
            <span class="status-badge">Logged In</span>
        </h1>
        
        <p>인증이 완료되었습니다. 아래는 현재 브라우저 세션에 발급된 정보입니다.</p>

        <h3>🔑 Current Session Info (JSON)</h3>
        <div id="auth-json" class="token-card">Loading user info...</div>

        <div class="btn-group" id="auth-buttons">
            <!-- 상태에 따라 자바스크립트로 버튼이 채워집니다 -->
        </div>
        </div>

        <script>
        function updateUI() {
            const token = localStorage.getItem('accessToken');
            const btnGroup = document.getElementById('auth-buttons');

            if (token) {
                btnGroup.innerHTML = `
                    <button onclick="logout()" class="btn btn-outline" style="color:red">로그아웃</button>
                    <a href="/" class="btn btn-primary">게이트웨이 포털</a>
                `;
            } else {
                btnGroup.innerHTML = `
                    <a href="/login.html" class="btn btn-primary">로그인</a>
                    <a href="/signup.html" class="btn btn-outline">회원가입</a>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('accessToken');
            // 서버 측 로그아웃 호출 (선택 사항)
            fetch('/api/v1/logout', { method: 'POST' }).finally(() => {
                alert('로그아웃 되었습니다.');
                // 현재 도메인의 루트로 이동하여 하드코딩 회피
                window.location.href = '/'; 
            });
        }

        async function fetchInfo() {
            try {
                const response = await fetch('/api/v1/users/me');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('auth-json').textContent = JSON.stringify(data, null, 2);
                    if (data.accessToken) localStorage.setItem('accessToken', data.accessToken);
                } else {
                    document.getElementById('auth-json').textContent = "로그인 세션이 없습니다.";
                }
            } catch (err) {
                document.getElementById('auth-json').textContent = "세션 확인 실패";
            }
            updateUI();
        }

        updateUI(); // 초기화
        fetchInfo();
        </script>

</body>
</html>
