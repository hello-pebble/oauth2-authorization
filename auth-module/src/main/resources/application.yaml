spring:
  application:
    name: basic-auth

server:
  address: 0.0.0.0
  port: ${PORT:8080}
  forward-headers-strategy: framework

datasource:
  url: ${DB_URL}
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}
  driver-class-name: org.postgresql.Driver

h2:
  console:
    enabled: false

jpa:
  database: postgresql
  generate-ddl: true
  show-sql: true
  hibernate:
    ddl-auto: update

security:
  oauth2:
    client:
      registration:
        google:
          client-id: ${GOOGLE_CLIENT_ID}
          client-secret: ${GOOGLE_CLIENT_SECRET}
          scope:
            - email
            - profile


management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 900000
  refresh-expiration: 604800000

auth:
  gateway-url: ${GATEWAY_URL}
  redirect-path: ${REDIRECT_PATH}
