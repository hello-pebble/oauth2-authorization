<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Task Service - 인증된 대시보드</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; color: #1c1e21; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { color: #1877f2; display: flex; align-items: center; justify-content: space-between; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .gateway-card { background-color: #fff9e6; border-left: 5px solid #f1c40f; }
        .auth-card { background-color: #e7f3ff; border-left: 5px solid #1877f2; }
        .json-box { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 6px; font-family: 'Fira Code', monospace; font-size: 0.85em; overflow-x: auto; white-space: pre-wrap; margin-top: 10px; }
        .task-list { margin-top: 20px; }
        .task-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .badge { font-size: 0.7em; vertical-align: middle; padding: 4px 10px; border-radius: 20px; color: white; }
        .badge-gate { background: #f39c12; }
        .badge-auth { background: #3498db; }
        .error-msg { color: #d63031; background: #fab1a0; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .back-btn { font-size: 0.85rem; color: #6366f1; text-decoration: none; padding: 6px 14px; border: 1px solid #6366f1; border-radius: 6px; }
        .back-btn:hover { background: #6366f1; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Task Service Dashboard
            <div>
                <span class="badge badge-gate">Gateway</span>
                <span class="badge badge-auth">JWT</span>
                <a href="/" class="back-btn">← 포털로</a>
            </div>
        </h1>

        <div id="error-banner" class="error-msg">인증 토큰이 없거나 만료되었습니다. 로그인이 필요합니다.</div>

        <div class="status-grid">
            <div class="card gateway-card">
                <strong>🛰 Gateway & Infrastructure</strong>
                <div id="gateway-info">확인 중...</div>
            </div>
            <div class="card auth-card">
                <strong>🔐 Authentication (JWT)</strong>
                <div id="auth-info">확인 중...</div>
            </div>
        </div>

        <h3>🔍 Raw Access Info (JSON)</h3>
        <div id="raw-json" class="json-box">{}</div>

        <div class="task-list">
            <h3>📝 My Tasks</h3>
            <div id="tasks-container">인증 후 데이터를 불러옵니다.</div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            // 로컬 스토리지에서 토큰 가져오기 (auth-module에서 저장했다고 가정)
            const token = localStorage.getItem('accessToken');
            
            const headers = { 'Content-Type': 'application/json' };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch('/api/tasks/access-info', { headers });
                
                if (response.status === 401 || response.status === 403) {
                    document.getElementById('error-banner').style.display = 'block';
                    document.getElementById('gateway-info').textContent = "인증 실패";
                    document.getElementById('auth-info').textContent = "접근 권한 없음";
                    return;
                }

                const data = await response.json();
                
                // 1. JSON 표시
                document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);

                // 2. 게이트웨이 정보 시각화
                const viaGate = data.accessInfo.viaGateway;
                document.getElementById('gateway-info').innerHTML = viaGate 
                    ? `<p style="color: #d35400;">✅ Gateway를 통해 접근 중<br><small>Host: ${data.accessInfo.gatewayHeaders['x-forwarded-host'] || 'Internal'}</small></p>`
                    : `<p style="color: #7f8c8d;">⚠️ 직접 접근 (Local/Direct)</p>`;

                // 3. 인증 정보 시각화
                const auth = data.authInfo;
                document.getElementById('auth-info').innerHTML = auth.authenticated
                    ? `<p style="color: #2980b9;">✅ 인증됨: ${auth.subject}<br><small>Token: ${auth.token_preview}</small></p>`
                    : `<p style="color: #c0392b;">❌ 미인증 상태</p>`;

                // 4. 태스크 리스트
                const tasksContainer = document.getElementById('tasks-container');
                if (data.tasks && data.tasks.length > 0) {
                    tasksContainer.innerHTML = data.tasks.map(t => `
                        <div class="task-item">
                            <span>${t.title}</span>
                            <span>${t.completed ? '✅' : '⏳'}</span>
                        </div>
                    `).join('');
                } else {
                    tasksContainer.textContent = "등록된 태스크가 없습니다.";
                }

            } catch (error) {
                console.error('Fetch Error:', error);
                document.getElementById('error-banner').textContent = "서버 연결 오류가 발생했습니다.";
                document.getElementById('error-banner').style.display = 'block';
            }
        }

        loadDashboard();
    </script>
</body>
</html>
