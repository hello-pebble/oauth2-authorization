server:
  port: ${PORT:8083}

spring:
  application:
    name: task-service

  datasource:
    url: ${DB_URL:jdbc:h2:mem:taskdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8080/oauth2/jwks}

logging:
  level:
    com.pebble.task: DEBUG
