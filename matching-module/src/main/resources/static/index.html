<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Matching Service - 인증된 대시보드</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; color: #1c1e21; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { color: #6366f1; display: flex; align-items: center; justify-content: space-between; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .gateway-card { background-color: #fffbeb; border-left: 5px solid #f59e0b; }
        .auth-card    { background-color: #eef2ff; border-left: 5px solid #6366f1; }
        .json-box { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 6px; font-family: 'Fira Code', monospace; font-size: 0.85em; overflow-x: auto; white-space: pre-wrap; margin-top: 10px; }
        .match-list { margin-top: 20px; }
        .match-item { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .match-item:last-child { border-bottom: none; }
        .badge { font-size: 0.72em; vertical-align: middle; padding: 3px 10px; border-radius: 20px; color: white; }
        .badge-gate { background: #f59e0b; }
        .badge-auth { background: #6366f1; }
        .error-msg { color: #d63031; background: #ffeaa7; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .back-btn { font-size: 0.85rem; color: #6366f1; text-decoration: none; padding: 6px 14px; border: 1px solid #6366f1; border-radius: 6px; }
        .back-btn:hover { background: #6366f1; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Matching Service Dashboard
            <div style="display:flex;gap:8px;align-items:center;">
                <span class="badge badge-gate">Gateway</span>
                <span class="badge badge-auth">JWT</span>
                <a href="/" class="back-btn">← 포털</a>
            </div>
        </h1>

        <div id="error-banner" class="error-msg"></div>

        <div class="status-grid">
            <div class="card gateway-card">
                <strong>🛰 Gateway & Infrastructure</strong>
                <div id="gateway-info" style="margin-top:8px;">확인 중...</div>
            </div>
            <div class="card auth-card">
                <strong>🔐 Authentication (JWT)</strong>
                <div id="auth-info" style="margin-top:8px;">확인 중...</div>
            </div>
        </div>

        <h3>🔍 Raw Access Info (JSON)</h3>
        <div id="raw-json" class="json-box">{}</div>

        <div class="match-list">
            <h3>💬 My Matches (<span id="match-count">0</span>)</h3>
            <div id="matches-container">인증 후 데이터를 불러옵니다.</div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            const token = localStorage.getItem('accessToken');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            try {
                const response = await fetch('/api/v1/matching/access-info', { headers });

                if (response.status === 401 || response.status === 403) {
                    showError('인증 토큰이 없거나 만료되었습니다. 로그인이 필요합니다.');
                    return;
                }
                if (!response.ok) {
                    showError(`서버 오류: ${response.status}`);
                    return;
                }

                const data = await response.json();

                // JSON 표시
                document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);

                // 게이트웨이 정보
                const viaGateway = data.accessInfo?.viaGateway;
                document.getElementById('gateway-info').innerHTML = viaGateway
                    ? `<p style="color:#d35400;">✅ Gateway를 통해 접근 중<br><small>Host: ${data.accessInfo.gatewayHeaders?.['x-forwarded-host'] || 'Internal'}</small></p>`
                    : `<p style="color:#7f8c8d;">⚠️ 직접 접근 (Local/Direct)</p>`;

                // 인증 정보
                const auth = data.authInfo;
                if (auth?.authenticated) {
                    document.getElementById('auth-info').innerHTML =
                        `<p style="color:#3730a3;">✅ 인증됨: <strong>${auth.subject}</strong><br>
                         <small>Role: ${auth.roles || '-'}</small><br>
                         <small>Token: ${auth.token_preview}</small></p>`;
                } else {
                    document.getElementById('auth-info').innerHTML =
                        `<p style="color:#c0392b;">❌ 미인증 상태</p>`;
                }

                // 매칭 목록
                const matches = data.matches || [];
                document.getElementById('match-count').textContent = data.matchesCount ?? matches.length;

                const container = document.getElementById('matches-container');
                if (matches.length > 0) {
                    container.innerHTML = matches.map(m => `
                        <div class="match-item">
                            <span>💬 Match ID: <strong>${m.id}</strong></span>
                            <span style="color:#6b7280;font-size:0.85em;">
                                User ${m.userA} ↔ User ${m.userB}
                            </span>
                            <span style="font-size:0.8em;color:#9ca3af;">${m.createdAt ? new Date(m.createdAt).toLocaleDateString('ko-KR') : ''}</span>
                        </div>
                    `).join('');
                } else {
                    container.textContent = '성사된 매칭이 없습니다.';
                }

            } catch (err) {
                showError('서버 연결 오류: ' + err.message);
            }
        }

        function showError(msg) {
            const banner = document.getElementById('error-banner');
            banner.textContent = msg;
            banner.style.display = 'block';
            document.getElementById('gateway-info').textContent = '확인 불가';
            document.getElementById('auth-info').textContent = '확인 불가';
        }

        loadDashboard();
    </script>
</body>
</html>
